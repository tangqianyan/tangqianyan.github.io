<div id="互信息"><h1 id="互信息" class="header"><a href="#互信息">互信息</a></h1></div>

<p>
两个随机变量的互信息 (Mutual Information, MI) 是变量间相互依赖性的度量。
</p>

<div id="互信息-互信息的定义"><h2 id="互信息的定义" class="header"><a href="#互信息-互信息的定义">互信息的定义</a></h2></div>
<p>
两个离散随机变量\(X\)和\(Y\)的互信息可以定义为：
&lt;math&gt;{{
\(
I(X;Y)
\)
}}
&lt;/math&gt;
</p>
